<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="500" height="500" rx="100" fill="url(#bg)"/>

  <!--
    Exact navbar logo reproduction:
    "On" (200 weight, uppercase, letter-spacing 1px)
    "Site" (800 weight, letter-spacing -0.5px)
    Blue dot: 6x6px, after "Site", raised up
  -->

  <!-- "On" — weight 200, uppercase -->
  <text x="208" y="270"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-weight="200" font-size="100"
        letter-spacing="5"
        text-anchor="end"
        fill="#FFFFFF">
    On
  </text>

  <!-- "Site" — weight 800 -->
  <text x="220" y="270"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-weight="800" font-size="100"
        letter-spacing="-2.5"
        text-anchor="start"
        fill="#FFFFFF">
    Site
  </text>

  <!-- Blue accent dot — 6px equivalent, raised above -->
  <circle cx="342" cy="218" r="12" fill="#2563EB"/>
</svg>
